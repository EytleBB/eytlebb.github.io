name: Generate gallery index

on:
  push:
    branches: [main]
    paths: ['images/gallery/**']

jobs:
  gen-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate images/gallery/index.json
        run: |
          python3 -c "
          import os, json
          exts = {'.png', '.jpg', '.jpeg', '.gif', '.webp'}
          files = sorted(
            f for f in os.listdir('images/gallery')
            if os.path.splitext(f)[1].lower() in exts
          )
          with open('images/gallery/index.json', 'w') as f:
              json.dump(files, f)
          print('Generated:', files)
          "

      - name: Commit index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/gallery/index.json
          git diff --staged --quiet || git commit -m "Auto-update gallery index [skip ci]"
          git push
