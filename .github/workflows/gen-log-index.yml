name: Generate log index

on:
  push:
    branches: [main]
    paths: ['logs/*.txt']

jobs:
  gen-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate logs/index.json
        run: |
          python3 -c "
          import os, json, re
          dates = sorted(
            [f[:-4] for f in os.listdir('logs') if re.match(r'^\d{4}-\d{2}-\d{2}\.txt$', f)],
            reverse=True
          )
          with open('logs/index.json', 'w') as f:
              json.dump(dates, f)
          print('Generated:', dates)
          "

      - name: Commit index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/index.json
          git diff --staged --quiet || git commit -m "Auto-update log index [skip ci]"
          git push
